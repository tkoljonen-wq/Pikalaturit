name: Collector – status (5 min)

# Hakee AFIR-statukset ja päivittää aggregaatit. Suunnitelma §11.2.
#
# HUOM: 5 min ajastus on SIIRRETTY Supabasen sisäiseen croniin (pg_cron + pg_net
# → Edge Function collector-status), koska GitHub Actions -schedule ei laukennut
# luotettavasti (uusi repo + */5 throttlaus). Tästä on jäljellä vain manuaali-
# laukaisu (workflow_dispatch) varafallbackiksi. Ks. supabase/functions/collector-status
# ja migraatio 20260618130000_cron_status.sql.

on:
  workflow_dispatch: {}

# Estä päällekkäiset ajot; vanha ajo saa valmistua.
concurrency:
  group: collector-status
  cancel-in-progress: false

jobs:
  status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run collector -- status
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
