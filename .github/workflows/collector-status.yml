name: Collector – status (5 min)

# Hakee AFIR-statukset ja päivittää aggregaatit. Suunnitelma §11.2.
# Huom: GitHub Actions -cron ei ole tarkka 5 min, vaan ajot voivat viivästyä
# ruuhkassa. Tämä on hyväksytty MVP:ssä (lähes reaaliaikainen riittää).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Estä päällekkäiset ajot; vanha ajo saa valmistua.
concurrency:
  group: collector-status
  cancel-in-progress: false

jobs:
  status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run collector -- status
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
