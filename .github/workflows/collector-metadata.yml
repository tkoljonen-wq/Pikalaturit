name: Collector – metadata (päivittäin)

# Synkronoi asema-/EVSE-/connector-metadatan AFIR locations/all -syötteestä.
# Suunnitelma §11.1.
#
# Laukaisu: Supabasen pg_cron käynnistää tämän workflow_dispatchilla klo 03:15 UTC
# (migraatio 20260619080000_cron_metadata_cleanup.sql). GitHubin oma `schedule` ei
# laukennut luotettavasti, joten siitä on luovuttu. Säilytyssiivous (cleanup) ajetaan
# nyt erikseen pg_cron-SQL:llä, ei enää tässä workflow'ssa.

on:
  workflow_dispatch: {}

concurrency:
  group: collector-metadata
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Metadatasynkronointi
        run: npm run collector -- metadata
